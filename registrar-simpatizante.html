<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Registrar Simpatizante
    </title>

    <link
        rel="stylesheet"
        href="css/formularios.css">

</head>

<body>

    <div class="contenedor">

        <h1>
            Nuevo Simpatizante
        </h1>

        <form id="formSimpatizante">
            <label>
                Nombre Completo
            </label>
            <input
                type="text"
                id="nombre"
                placeholder="Nombre Completo"
                required>

            <label>
                Celular
            </label>
            <input
                type="number"
                id="celular"
                placeholder="Celular">

            <label>
                Fecha de Ingreso
            </label>
            <input
                type="date"
                id="fechaIngreso">

            <button type="submit">

                Guardar

            </button>

        </form>

    </div>

    <script
        type="module"
        src="js/registrar-simpatizante.js">
    </script>

</body>

</html>
